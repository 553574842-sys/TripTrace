<svg xmlns="http://www.w3.org/2000/svg" width="420" height="132" viewBox="0 0 420 132" role="img" aria-labelledby="title desc">
  <title id="title">TripTrace / 旅迹 logo</title>
  <desc id="desc">A route pin and travel trace logo for TripTrace.</desc>
  <defs>
    <linearGradient id="pin" x1="18" y1="16" x2="102" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="route" x1="18" y1="94" x2="126" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ea580c"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="132" rx="28" fill="#f8fafc"/>
  <rect x="1" y="1" width="418" height="130" rx="27" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  <g transform="translate(22 18)">
    <path d="M49 5c24.3 0 44 19.7 44 44 0 31.5-44 76-44 76S5 80.5 5 49C5 24.7 24.7 5 49 5Z" fill="url(#pin)"/>
    <circle cx="49" cy="48" r="18" fill="#ecfeff"/>
    <path d="M20 84c19.5-23.5 42.5-17.5 52-35 5.4-10-1-19.1-11.5-18.5-8 .5-12 5.8-13.5 12.5" fill="none" stroke="url(#route)" stroke-width="9" stroke-linecap="round"/>
    <circle cx="21" cy="84" r="6" fill="#ea580c"/>
    <circle cx="96" cy="33" r="6" fill="#f59e0b"/>
  </g>
  <g fill="#111827" font-family="Inter, 'Segoe UI', Arial, sans-serif">
    <text x="142" y="62" font-size="40" font-weight="800" letter-spacing="0">TripTrace</text>
    <text x="144" y="97" font-size="25" font-weight="700" letter-spacing="2">旅迹</text>
    <text x="214" y="97" font-size="15" font-weight="500" fill="#0f766e">把每一段旅程安排清楚</text>
  </g>
